version: '3.9'
services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - MONGO_URL=mongodb://mongodb:27017
    depends_on: [mongodb]
  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]
volumes:
  mongo_data:
